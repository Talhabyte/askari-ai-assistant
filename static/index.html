<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Askari AI Assistant</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      background: #f4f7fb;
      margin: 0;
      padding: 0;
    }

    .container {
      max-width: 800px;
      margin: 40px auto;
      background: white;
      border-radius: 16px;
      padding: 24px;
      box-shadow: 0 10px 30px rgba(0,0,0,0.08);
    }

    h1 {
      margin-top: 0;
      color: #0b3d91;
    }

    p {
      color: #444;
    }

    textarea {
      width: 100%;
      min-height: 120px;
      padding: 14px;
      font-size: 16px;
      border-radius: 12px;
      border: 1px solid #ccc;
      resize: vertical;
      box-sizing: border-box;
    }

    button {
      margin-top: 14px;
      background: #0b3d91;
      color: white;
      border: none;
      padding: 12px 20px;
      font-size: 16px;
      border-radius: 10px;
      cursor: pointer;
    }

    button:hover {
      opacity: 0.92;
    }

    .response {
      margin-top: 24px;
      background: #eef4ff;
      border-left: 4px solid #0b3d91;
      padding: 16px;
      border-radius: 10px;
      white-space: pre-wrap;
    }

    .label {
      font-weight: bold;
      margin-bottom: 8px;
      color: #0b3d91;
    }
  </style>
</head>
<body>
  <div class="container">
    <h1>Askari AI Assistant</h1>
    <p>
      Demo banking assistant built with FastAPI, REST API, and prompt engineering.
    </p>

    <textarea id="message" placeholder="Ask something like: How can I open a savings account?"></textarea>
    <br />
    <button onclick="sendMessage()">Ask AI</button>

    <div class="response" id="responseBox" style="display:none;">
      <div class="label">Assistant Reply:</div>
      <div id="responseText"></div>
    </div>
  </div>

  <script>
    async function sendMessage() {
      const message = document.getElementById("message").value.trim();
      const responseBox = document.getElementById("responseBox");
      const responseText = document.getElementById("responseText");

      if (!message) {
        alert("Please enter a message.");
        return;
      }

      responseBox.style.display = "block";
      responseText.textContent = "Thinking...";

      try {
        const res = await fetch("/chat", {
          method: "POST",
          headers: {
            "Content-Type": "application/json"
          },
          body: JSON.stringify({ message })
        });

        const data = await res.json();
        responseText.textContent = data.reply;
      } catch (error) {
        responseText.textContent = "Something went wrong.";
      }
    }
  </script>
</body>
</html>
